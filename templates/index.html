<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>URL Shortener</h1>
            <p class="subtitle">Make your long URLs short and shareable</p>

            <div class="input-group">
                <input 
                    type="url" 
                    id="urlInput" 
                    placeholder="Enter your long URL here..." 
                    required
                >
                <button id="shortenBtn" class="btn-primary">Shorten URL</button>
            </div>

            <div id="error" class="error-message"></div>
            <div id="success" class="success-message"></div>

            <div id="result" class="result-container" style="display: none;">
                <div class="result-item">
                    <label>Original URL:</label>
                    <p id="originalUrl" class="url-text"></p>
                </div>
                <div class="result-item">
                    <label>Short URL:</label>
                    <div class="short-url-box">
                        <p id="shortUrl" class="url-text"></p>
                        <button id="copyBtn" class="btn-secondary">Copy</button>
                    </div>
                </div>
            </div>

            <div id="loadingSpinner" class="spinner" style="display: none;"></div>
        </div>

        <footer class="footer">
            <p>Built with Flask, MySQL, and ❤️</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
